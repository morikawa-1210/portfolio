      <h2>CONTACT</h2>

      <div class="contact">
        <form action="#">
          <h3>お問い合わせフォーム</h3>
          <dl class="form-area">
            <dt><span class="required">お名前</span></dt>
            <dd>
              <input class="input-text" type="text" name="name" required />
            </dd>
            <dt><span class="required">メールアドレス</span></dt>
            <dd>
              <input class="input-text" type="email" name="email" required />
            </dd>
            <dt>お電話番号</dt>
            <dd><input class="input-text" type="tel" name="tel" /></dd>
            <dt><span class="required">お問い合わせ種別</span></dt>
            <dd>
              <select name="genre" class="select-box">
                <option value="ご予約について" 　selected>
                  ご予約について
                </option>
                <option value="採用について">採用について</option>
                <option value="その他お問い合わせ">その他お問い合わせ</option>
              </select>
            </dd>
            <dt><span class="required">お問い合わせ内容</span></dt>
            <dd>
              <textarea class="message" name="message" required></textarea>
            </dd>
          </dl>
          <p class="conform-text">
            ご入力内容をご確認の上、お間違いがなければ、[Submit]ボタンを押してください。
          </p>
          <button class="submit-button" type="submit">Submit</button>
        </form>
      </div>
